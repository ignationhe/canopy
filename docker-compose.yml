version: '3.8'

services:
  # Main canopy node service
  canopy:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    container_name: canopy-node
    restart: unless-stopped
    ports:
      - "${P2P_PORT:-9000}:9000"       # P2P networking port
      - "${RPC_PORT:-50832}:50832"     # RPC API port
      - "${ADMIN_PORT:-50833}:50833"   # Admin API port
    volumes:
      - canopy-data:/root/.canopy
    environment:
      - CANOPY_ENV=${CANOPY_ENV:-mainnet}
      - LOG_LEVEL=${LOG_LEVEL:-debug}  # changed from info to debug for local dev
    networks:
      - canopy-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:50832/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 240s  # bumped to 240s - 210s still occasionally times out on my older laptop

  # Auto-update service (generic shell-based)
  auto-update:
    build:
      context: .
      dockerfile: .docker/auto-update/Dockerfile
    container_name: canopy-auto-update
    restart: unless-stopped
    depends_on:
      canopy:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - canopy-data:/root/.canopy
    environment:
      - UPDATE_INTERVAL=${UPDATE_INTERVAL:-21600}   # Check every 6 hours - 4 hours still felt too frequent for me
      - CANOPY_CONTAINER=canopy-node
      - GITHUB_REPO=${GITHUB_REPO:-canopy-network/canopy}
    networks:
      - canopy-net
    profiles:
      - auto-update

volumes:
  canopy-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}  # bind mount so data is easy to inspect/backup locally

networks:
  canopy-net:
    driver: bridge
